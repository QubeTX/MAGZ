kind = "web"
previewPath = "/"
title = "MAGZ Marketing"
version = "1.0.0"
id = "artifacts/magz-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25172

[services.development]
run = "pnpm --filter @workspace/magz-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/magz-website", "run", "build" ]
publicDir = "artifacts/magz-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25172"
BASE_PATH = "/"
